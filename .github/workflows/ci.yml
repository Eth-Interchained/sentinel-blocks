name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  node:
    name: Node / TypeScript
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm install
      - run: npm run build
      - run: node tests/test_core.mjs
      - run: node tests/test_core.cjs
      - run: npx tsx tests/test_core.ts

  python:
    name: Python
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python3 tests/test_core.py

  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - working-directory: implementations/go
        run: go test ./...

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - working-directory: implementations/rust
        run: cargo test

  c:
    name: C
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - working-directory: implementations/c
        run: cc -std=c99 -Wall -Wextra test_sentinel_blocks.c sentinel_blocks.c -o t && ./t

  cpp:
    name: C++
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - working-directory: implementations/cpp
        run: c++ -std=c++17 -Wall -Wextra test_sentinel_blocks.cpp -o t && ./t

  java:
    name: Java
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - working-directory: implementations/java
        run: javac SentinelBlocks.java SentinelBlocksTest.java && java SentinelBlocksTest

  ruby:
    name: Ruby
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
      - working-directory: implementations/ruby
        run: ruby test_sentinel_blocks.rb

  php:
    name: PHP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - working-directory: implementations/php
        run: php test_sentinel_blocks.php
